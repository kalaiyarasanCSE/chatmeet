<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room — ChatMeet</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (sessionStorage.getItem('cm_name') && sessionStorage.getItem('cm_room')) {
            location.replace('room.html');
        }
    </script>
</head>
<body class="auth-page">

<div class="card">
    <button class="back-link" onclick="location.href='index.html'">← Back to Home</button>

    <div class="logo">
        <span class="logo-icon">🏠</span>
        <h1>Create a <span>Room</span></h1>
        <p>Share the code with your friends to join</p>
    </div>

    <div class="room-preview">
        <div class="rp-label">Your Room Code</div>
        <div class="rp-code" id="generatedCode">----</div>
        <div class="rp-hint">Tap to copy &amp; share with friends</div>
    </div>

    <div class="inp-group">
        <label>Your Name</label>
        <input id="hostName" placeholder="What should we call you?" maxlength="20"
               onkeypress="if(event.key==='Enter') createRoom()">
    </div>
    <p class="err" id="createErr">Please enter your name.</p>
    <button class="btn-primary" onclick="createRoom()">🚀 Enter Room</button>
</div>

<div id="toast"></div>

<script>
const roomCode = String(Math.floor(1000 + Math.random() * 9000));
document.getElementById('generatedCode').innerText = roomCode;
setTimeout(() => document.getElementById('hostName').focus(), 150);

// Tap room code to copy
document.querySelector('.room-preview').addEventListener('click', () => {
    navigator.clipboard.writeText(roomCode).then(() => {
        const hint = document.querySelector('.rp-hint');
        hint.textContent = '✅ Copied to clipboard!';
        setTimeout(() => hint.textContent = 'Tap to copy & share with friends', 2000);
    });
});

function createRoom() {
    const name = document.getElementById('hostName').value.trim();
    const err  = document.getElementById('createErr');
    if (!name) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    sessionStorage.setItem('cm_name', name);
    sessionStorage.setItem('cm_room', roomCode);
    sessionStorage.setItem('cm_isHost', 'true');
    location.href = 'room.html';
}
</script>
</body>
</html>
